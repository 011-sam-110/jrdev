server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — replace with your cert paths (e.g. from certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Static files served directly by nginx (faster than gunicorn)
    location /static/ {
        alias /var/www/jrdev/backend/app/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else goes to gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    # Limit upload size (matches Flask MAX_CONTENT_LENGTH)
    client_max_body_size 16M;

    # Logs
    access_log /var/log/nginx/jrdev-access.log;
    error_log  /var/log/nginx/jrdev-error.log;
}
