<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Setup 2FA - JrDev Platform</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#14F195", // Electric Teal
                        secondary: "#8B5CF6", // Vibrant Violet
                        "background-light": "#F1F5F9",
                        "background-dark": "#0F172A",
                        "surface-dark": "#1E293B",
                        "surface-light": "#FFFFFF",
                    },
                    fontFamily: {
                        display: ["'Space Grotesk'", "sans-serif"],
                        body: ["'Inter'", "sans-serif"],
                    },
                    backgroundImage: {
                        'hero-gradient': 'radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%)',
                        'accent-gradient': 'linear-gradient(to right, #14F195, #8B5CF6)',
                    }
                },
            },
        };
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.3s ease, background 0.3s ease;
        }
        .text-glow {
            text-shadow: 0 0 20px rgba(20, 241, 149, 0.3);
        }

        /* Hero Glow */
        .hero::before {
            content: "";
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(20,241,149,0.1) 0%, transparent 70%);
            filter: blur(80px);
            bottom: -200px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
            pointer-events: none;
        }

        .btn-gradient {
            background: linear-gradient(90deg, #14F195, #8B5CF6, #14F195);
            background-size: 200% 200%;
            animation: gradientShift 5s ease infinite;
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(20, 241, 149, 0.4);
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 font-body transition-colors duration-300 min-h-screen flex flex-col hero relative overflow-hidden">
    <!-- Navbar -->
    <nav id="navbar" class="fixed top-0 w-full z-50 transition-all duration-300 border-b border-white/5 bg-background-dark/80 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="{{ url_for('main.home') }}" class="flex-shrink-0 flex items-center gap-2">
                    <span class="material-icons-round text-primary text-3xl">code</span>
                    <span class="font-display font-bold text-xl tracking-tight text-slate-900 dark:text-white">Jr<span class="text-primary text-glow">Dev</span></span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-grow flex items-center justify-center pt-32 pb-20 px-4 relative">
        <!-- Background Blobs -->
        <div class="absolute top-20 left-1/4 w-96 h-96 bg-primary/20 rounded-full blur-[128px] animate-pulse"></div>
        <div class="absolute bottom-20 right-1/4 w-96 h-96 bg-secondary/20 rounded-full blur-[128px] animate-pulse" style="animation-delay: 2s;"></div>

        <div class="w-full max-w-md relative z-10">
            <div class="glass p-8 rounded-2xl bg-surface-dark border border-white/10">
                <h2 class="text-3xl font-display font-bold text-center mb-6 text-white">Setup 2FA</h2>
                <p class="text-slate-400 text-center mb-8">Scan the QR code below with your authenticator app (like Google Authenticator or Authy).</p>
                
                <div class="flex justify-center mb-8">
                    <div class="bg-white p-4 rounded-xl">
                        <img src="data:image/png;base64, {{ qr_code }}" alt="2FA QR Code" class="w-48 h-48">
                    </div>
                </div>

                <form method="POST" action="">
                    <div class="space-y-5">
                       <div>
                            <label for="token" class="block text-sm font-medium text-slate-400 mb-2">Enter 6-digit Code</label>
                            <input type="text" name="token" id="token" 
                                class="w-full px-4 py-3 rounded-xl bg-black/20 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-transparent transition-all hover:bg-black/30 text-center text-2xl tracking-widest"
                                placeholder="000 000" maxlength="6" autocomplete="off" required>
                        </div>
                        
                        <button type="submit" class="w-full py-4 px-6 rounded-xl btn-gradient text-slate-900 font-bold text-lg shadow-[0_0_20px_rgba(20,241,149,0.2)] hover:shadow-[0_0_30px_rgba(20,241,149,0.4)] transition-all transform hover:-translate-y-1 mt-4">
                            Verify & Complete Setup
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
