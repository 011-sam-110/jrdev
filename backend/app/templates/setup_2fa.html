{% extends 'auth_layout.html' %}

{% block title %}Setup 2FA - JrDev Platform{% endblock %}
{% block card_title %}Setup 2FA{% endblock %}
{% block card_lead %}
    <p class="text-slate-400 text-center mb-8">Scan the QR code below with your authenticator app (like Google Authenticator or Authy).</p>
{% endblock %}

{% block content %}
    <div class="flex justify-center mb-8">
        <div class="bg-white p-4 rounded-xl">
            <img src="data:image/png;base64, {{ qr_code }}" alt="2FA QR Code" class="w-48 h-48">
        </div>
    </div>

    <form method="POST" action="">
        <div class="space-y-5">
            <div>
                <label for="token" class="block text-sm font-medium text-slate-400 mb-2">Enter 6-digit Code</label>
                <input type="text" name="token" id="token"
                    class="w-full px-4 py-3 rounded-xl bg-black/20 border border-white/10 text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-transparent transition-all hover:bg-black/30 text-center text-2xl tracking-widest"
                    placeholder="000 000" maxlength="6" autocomplete="off" required>
            </div>

            <button type="submit" class="w-full py-4 px-6 rounded-xl btn-gradient text-slate-900 font-bold text-lg shadow-[0_0_20px_rgba(20,241,149,0.2)] hover:shadow-[0_0_30px_rgba(20,241,149,0.4)] transition-all transform hover:-translate-y-1 mt-4">
                Verify & Complete Setup
            </button>
        </div>
    </form>
{% endblock %}
