<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <meta name="description" content="JrDev connects businesses with student developers for rapid, affordable software prototyping. Launch a sprint, get an MVP built, pay only when deliverables are met."/>
        <link rel="icon" type="image/svg+xml" href="/backend/app/static/favicon.svg"/>
        <title>JrDev | Rapid prototyping by emerging talent</title>
        <link href="https://fonts.googleapis.com" rel="preconnect"/>

        <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    <body>
        <nav class="navbar">
            <div class="navLeft">
                <navCode>&lt &gt</navCode>
                Jr<dev>Dev</dev>
            </div>

            <div class="navMiddle">
                <a href="#how-it-works">How it Works</a>
                <a href="#for-students">For Students</a>
                <a href="#for-businesses">For Businesses</a>
                <a href="#pricing">Pricing</a>
            </div>

            <div class="navRight">
                {% if current_user.is_authenticated %}
                    <a href="/account">My Account</a>
                    <a href="/logout">Logout</a>

                    <a href="login.html">Login</a>
                    <a href="/register?role=DEVELOPER">Join as Developer</a>
