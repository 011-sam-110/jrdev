{% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
            <div class="mb-6 p-4 rounded-lg bg-{{ category }}/10 border border-{{ category }}/20 text-{{ category }} text-sm font-medium">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
{% endwith %}
