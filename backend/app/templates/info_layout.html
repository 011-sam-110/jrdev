<!DOCTYPE html>
<html class="scroll-smooth h-full" lang="en">
<head>
    <meta charset="utf-8"/>
    <script>(function(){var s=localStorage.getItem('theme');if(s==='dark'||(!s&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');})();</script>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>
    <title>{% block title %}JrDev{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid-glass.css') }}"/>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#4f46e5",
                        mint: "#4f46e5",
                        purple: "#0d9488",
                        secondary: "#0d9488",
                        navy: { 900: "#0F172A", 800: "#1E293B", 700: "#334155" },
                        "background-dark": "#0F172A",
                        "surface-dark": "#1E293B",
                    },
                    fontFamily: {
                        display: ["'Space Grotesk'", "sans-serif"],
                        body: ["'Inter'", "sans-serif"],
                    }
                }
            }
        };
    </script>
    <style>
        .text-glow { text-shadow: 0 0 20px rgba(79, 70, 229, 0.3); }
        .btn-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.35);
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 font-body h-full min-h-screen flex flex-col relative transition-colors duration-300">
    {% set nav_variant = 'content' %}
    {% include 'partials/public_nav.html' with context %}

    <main class="flex-grow pt-28 pb-16 px-4 sm:px-6 lg:px-8 max-w-5xl mx-auto w-full relative z-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="border-t border-neutral-200 dark:border-white/5 py-10 mt-auto relative z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="text-slate-500 dark:text-slate-400 text-sm">&copy; 2026 JrDev Platform. All rights reserved.</div>
            <div class="flex gap-6 text-sm text-slate-600 dark:text-slate-400">
                <a class="hover:text-primary transition-colors" href="{{ url_for('main.privacy') }}">Privacy Policy</a>
                <a class="hover:text-primary transition-colors" href="{{ url_for('main.terms') }}">Terms &amp; Conditions</a>
                <a class="hover:text-primary transition-colors" href="{{ url_for('main.support') }}">Support</a>
            </div>
        </div>
    </footer>

    <svg aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="glass-refraction" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence type="fractalNoise" baseFrequency="0.012 0.012" numOctaves="2" seed="2" result="noise"/>
                <feGaussianBlur in="noise" stdDeviation="1.2" result="blurredNoise"/>
                <feDisplacementMap in="SourceGraphic" in2="blurredNoise" scale="12" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>
    <script>
    (function() {
        var html = document.documentElement;
        function updateDarkIcons() {
            var isDark = html.classList.contains('dark');
            document.querySelectorAll('.dark-mode-icon-light').forEach(function(el) { el.classList.toggle('hidden', isDark); });
            document.querySelectorAll('.dark-mode-icon-dark').forEach(function(el) { el.classList.toggle('hidden', !isDark); });
            document.querySelectorAll('.dark-mode-label').forEach(function(el) { if (el) el.textContent = isDark ? 'Light Mode' : 'Dark Mode'; });
        }
        function toggleDark() {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            updateDarkIcons();
        }
        updateDarkIcons();
        document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDark);
        document.getElementById('dark-mode-toggle-mobile')?.addEventListener('click', toggleDark);
    })();
    (function() {
        var btn = document.getElementById('nav-menu-btn');
        var menu = document.getElementById('nav-mobile-menu');
        var iconOpen = btn ? btn.querySelector('.nav-menu-icon-open') : null;
        var iconClose = btn ? btn.querySelector('.nav-menu-icon-close') : null;
        function closeMenu() {
            if (!menu) return;
            menu.classList.remove('open');
            menu.setAttribute('aria-hidden', 'true');
            if (btn) btn.setAttribute('aria-expanded', 'false');
            if (iconOpen) iconOpen.classList.remove('hidden');
            if (iconClose) iconClose.classList.add('hidden');
            document.body.style.overflow = '';
        }
        function toggleMenu() {
            if (!menu) return;
            if (menu.classList.contains('open')) { closeMenu(); return; }
            menu.classList.add('open');
            menu.setAttribute('aria-hidden', 'false');
            if (btn) btn.setAttribute('aria-expanded', 'true');
            if (iconOpen) iconOpen.classList.add('hidden');
            if (iconClose) iconClose.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        if (btn && menu) {
            btn.addEventListener('click', toggleMenu);
            var links = menu.querySelectorAll('.nav-mobile-link');
            for (var i = 0; i < links.length; i++) links[i].addEventListener('click', closeMenu);
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && menu && menu.classList.contains('open')) closeMenu();
        });
    })();
    function toggleFaq(btn) {
        var answer = btn.querySelector('.faq-answer');
        var plus = btn.querySelector('.faq-plus');
        var ping = btn.querySelector('.faq-icon-ping');
        var isOpen = btn.getAttribute('aria-expanded') === 'true';
        document.querySelectorAll('.faq-trigger[aria-expanded="true"]').forEach(function(other) {
            if (other !== btn) {
                other.setAttribute('aria-expanded', 'false');
                var oa = other.querySelector('.faq-answer');
                if (oa) oa.style.maxHeight = '0';
                var op = other.querySelector('.faq-plus');
                if (op) op.classList.remove('rotate-45');
                var oping = other.querySelector('.faq-icon-ping');
                if (oping) oping.classList.remove('animate-ping');
                var glow = other.closest('.faq-card');
                if (glow) { var g = glow.querySelector('.faq-glow'); if (g) { g.classList.remove('opacity-100'); g.classList.add('opacity-0'); } }
            }
        });
        if (isOpen) {
            btn.setAttribute('aria-expanded', 'false');
            if (answer) answer.style.maxHeight = '0';
            if (plus) plus.classList.remove('rotate-45');
            if (ping) ping.classList.remove('animate-ping');
        } else {
            btn.setAttribute('aria-expanded', 'true');
            if (answer) answer.style.maxHeight = answer.scrollHeight + 'px';
            if (plus) plus.classList.add('rotate-45');
            if (ping) ping.classList.add('animate-ping');
        }
    }
    </script>
</body>
</html>
