<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <script>(function(){var s=localStorage.getItem('theme');if(s==='dark'||(!s&&window.matchMedia('(prefers-color-scheme: dark)').matches))document.documentElement.classList.add('dark');})();</script>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}"/>
    <title>JrDev Platform - {{ title if title else 'Home' }}</title>
    <meta property="og:title" content="JrDev | Rapid prototyping by university talent"/>
    <meta property="og:description" content="Connect businesses with student developers for rapid, affordable software prototyping."/>
    <meta property="og:type" content="website"/>
    <meta property="og:site_name" content="JrDev"/>
    <meta name="twitter:card" content="summary"/>
    <meta name="twitter:title" content="JrDev | Rapid prototyping by university talent"/>
    <meta name="twitter:description" content="Connect businesses with student developers for rapid, affordable software prototyping."/>
    <link rel="canonical" href="{{ request.url }}"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#4f46e5",
                        secondary: "#0d9488",
                        "background-light": "#f8fafc",
                        "background-dark": "#0F172A",
                        "surface-dark": "#1E293B",
                        "surface-light": "#FFFFFF",
                    },
                    fontFamily: {
                        display: ["'Space Grotesk'", "sans-serif"],
                        body: ["'Inter'", "sans-serif"],
                    },
                    backgroundImage: {
                        'hero-gradient': 'radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 100%)',
                        'accent-gradient': 'linear-gradient(to right, #4f46e5, #0d9488)',
                    }
                },
            },
        };
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/liquid-glass.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">
    <style>
        .text-glow {
            text-shadow: 0 0 20px rgba(20, 241, 149, 0.3);
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            background-size: 200% 200%;
            animation: gradientShift 5s ease infinite;
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.35);
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100 font-body transition-colors duration-300 min-h-screen flex flex-col">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[10000] focus:px-4 focus:py-2 focus:bg-indigo-600 focus:text-white focus:rounded-lg focus:text-sm focus:font-medium">Skip to content</a>
    {% set nav_variant = 'content' %}
    {% include 'partials/public_nav.html' with context %}

    <!-- Content -->
    <main id="main-content" class="app-main-in flex-grow pt-28">
        <!-- Notification bar removed as requested -->
        
        {% block content %}{% endblock %}
    </main>

    <!-- Liquid Glass SVG Filter (global, hidden) -->
    <svg style="position: absolute; width: 0; height: 0; overflow: hidden;" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="glass-distortion" x="0%" y="0%" width="100%" height="100%">
                <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise" />
                <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
                <feDisplacementMap in="SourceGraphic" in2="blurred" scale="77" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>

    <script>
    (function() {
        var html = document.documentElement;
        function updateDarkIcons() {
            var isDark = html.classList.contains('dark');
            document.querySelectorAll('.dark-mode-icon-light').forEach(function(el) { el.classList.toggle('hidden', isDark); });
            document.querySelectorAll('.dark-mode-icon-dark').forEach(function(el) { el.classList.toggle('hidden', !isDark); });
            document.querySelectorAll('.dark-mode-label').forEach(function(el) { if (el) el.textContent = isDark ? 'Light Mode' : 'Dark Mode'; });
        }
        function toggleDark() {
            html.classList.toggle('dark');
            localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
            updateDarkIcons();
        }
        updateDarkIcons();
        document.getElementById('dark-mode-toggle')?.addEventListener('click', toggleDark);
        document.getElementById('dark-mode-toggle-mobile')?.addEventListener('click', toggleDark);
    })();
    (function() {
        var btn = document.getElementById('nav-menu-btn');
        var menu = document.getElementById('nav-mobile-menu');
        var iconOpen = btn ? btn.querySelector('.nav-menu-icon-open') : null;
        var iconClose = btn ? btn.querySelector('.nav-menu-icon-close') : null;
        function closeMenu() {
            if (!menu) return;
            menu.classList.remove('open');
            menu.setAttribute('aria-hidden', 'true');
            if (btn) btn.setAttribute('aria-expanded', 'false');
            if (iconOpen) iconOpen.classList.remove('hidden');
            if (iconClose) iconClose.classList.add('hidden');
            document.body.style.overflow = '';
        }
        function toggleMenu() {
            if (!menu) return;
            if (menu.classList.contains('open')) { closeMenu(); return; }
            menu.classList.add('open');
            menu.setAttribute('aria-hidden', 'false');
            if (btn) btn.setAttribute('aria-expanded', 'true');
            if (iconOpen) iconOpen.classList.add('hidden');
            if (iconClose) iconClose.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }
        if (btn && menu) {
            btn.addEventListener('click', toggleMenu);
            var links = menu.querySelectorAll('.nav-mobile-link');
            for (var i = 0; i < links.length; i++) links[i].addEventListener('click', closeMenu);
        }
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && menu && menu.classList.contains('open')) closeMenu();
        });
    })();
    (function() {
        var io = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) { e.target.classList.add('active'); io.unobserve(e.target); }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(function(el) { io.observe(el); });
    })();
    </script>
    <script src="{{ url_for('static', filename='js/form-loading.js') }}"></script>
</body>
</html>
