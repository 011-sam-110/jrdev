{% extends "info_layout.html" %}
{% block title %}JrDev | Page not found{% endblock %}
{% block content %}
<div class="text-center py-16">
    <span class="material-icons-round text-slate-500 text-6xl mb-4">search_off</span>
    <h1 class="font-display text-3xl md:text-4xl font-bold text-white mb-3">Page not found</h1>
    <p class="text-slate-400 max-w-md mx-auto mb-8">The page you're looking for doesn't exist or has been moved.</p>
    <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="{{ url_for('main.home') }}" class="btn-gradient text-white px-6 py-3 rounded-full font-semibold inline-flex items-center justify-center gap-2">Back to home</a>
        <a href="{{ url_for('main.support') }}" class="text-slate-400 hover:text-primary transition-colors inline-flex items-center justify-center gap-2">Contact Support</a>
    </div>
</div>
{% endblock %}
